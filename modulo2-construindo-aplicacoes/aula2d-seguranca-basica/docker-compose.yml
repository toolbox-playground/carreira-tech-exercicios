services:
  db:
    image: mysql:8.0
    container_name: aula2d_mysql
    environment:
      MYSQL_ROOT_PASSWORD: senha123
      MYSQL_DATABASE: carreirtech
      MYSQL_USER: appuser
      MYSQL_PASSWORD: senha123
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psenha123"]
      interval: 5s
      timeout: 5s
      retries: 10
